<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高德地图代理示例</title>
    <style>
        /* 简单设置地图容器样式，让它占满全屏 */
        html, body, #map-container {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>
    <div id="map-container"></div>
    <script>
        // 安全配置：由于我们的代理服务也在本地，这里就指向当前服务的根路径即可。
        // 最终的地图瓦片请求会被发送到 /_AMapService/...
        window._AMapSecurityConfig = {
            serviceHost: location.origin + "/_AMapService/",
        };
    </script>
    <!-- 加载高德地图 JS API 2.0 -->
    <script>
        // 使用动态创建 script 标签的方式来异步加载高德地图 API
        // 并在加载完成后初始化地图
        function loadAmapAndInit() {
            const script = document.createElement('script');
            // 注意：这里只传入了 key，没有像传统方式那样直接传递 jscode。
            // 因为 jscode 将由我们即将搭建的代理服务器在转发请求时自动附加。
            script.src = `https://webapi.amap.com/maps?v=2.0&key=c702b6698ea0898766913261b621ca9f&callback=initMap`;
            document.head.appendChild(script);
        }

        // 地图初始化函数
        function initMap() {
            const map = new AMap.Map('map-container', {
                zoom: 11,               // 初始化地图级别
                center: [116.397428, 39.90923], // 初始化地图中心点 (北京天安门)
                viewMode: '2D',         // 使用2D视图模式
            });
            console.log('地图加载成功！');
        }

        // 页面加载完成后开始加载地图
        window.onload = loadAmapAndInit;
    </script>
</body>
</html>
